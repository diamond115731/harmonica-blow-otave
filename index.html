<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>임지수 하모니카 - 21홀 날숨 마스터</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #228be6; --success: #40c057; --error: #fa5252; --bg: #f0f4f8; --title-font: 'Noto Sans KR', sans-serif; }
        /* 보안: 텍스트 선택 및 우클릭 방지 */
        * { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; -webkit-touch-callout: none; }
        body { font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background-color: var(--bg); transition: 0.1s; overflow-x: hidden; }
        body.success-glow { background-color: #51cf66 !important; }
        .main-title { font-family: var(--title-font); font-weight: 900; font-size: 2.3rem; color: #1a1a1a; margin-bottom: 15px; letter-spacing: -1px; }
        .container { background: rgba(255, 255, 255, 0.98); padding: 1.5rem; border-radius: 35px; box-shadow: 0 25px 50px rgba(0,0,0,0.1); text-align: center; width: 95%; max-width: 1400px; }
        #harmonica-svg { width: 100%; height: auto; margin-bottom: 10px; filter: drop-shadow(0 15px 20px rgba(0,0,0,0.2)); }
        .hole { fill: #1a1a1a; stroke: #333; stroke-width: 1.5px; transition: 0.1s; }
        .hole.active { fill: var(--primary); }
        .do-box { fill: none; stroke: #ff0000; stroke-width: 3px; pointer-events: none; opacity: 0.5; }
        .menu-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .menu-btn { padding: 12px 5px; border: 2px solid #e9ecef; border-radius: 12px; background: white; cursor: pointer; font-weight: 800; font-size: 1.1rem; color: #343a40; transition: 0.2s; display: flex; justify-content: center; align-items: center; }
        .num-box { display: inline-flex; flex-direction: column; align-items: center; justify-content: center; width: 18px; line-height: 1; margin: 0 2px; }
        .dot { width: 3.5px; height: 3.5px; background-color: currentColor; border-radius: 50%; display: block; }
        .menu-btn.active { background: var(--primary); color: white; border-color: var(--primary); transform: scale(1.02); }
        .indicator-container { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; }
        .note-lamp { width: 150px; padding: 12px; border-radius: 15px; background: #e9ecef; color: #adb5bd; font-weight: 800; }
        .note-lamp.active { background: var(--primary); color: white; box-shadow: 0 0 15px rgba(34, 139, 230, 0.4); }
        #visualizer { width: 100%; height: 80px; background: #1a1a1a; border-radius: 15px; margin-bottom: 15px; }
        .status-msg { font-size: 1.3rem; font-weight: bold; min-height: 4rem; display: flex; align-items: center; justify-content: center; color: #495057; line-height: 1.4; white-space: pre-line; }
        .progress-bar { width: 100%; height: 10px; background: #eee; border-radius: 5px; overflow: hidden; margin-bottom: 15px; }
        #progress-fill { width: 0%; height: 100%; background: var(--success); transition: width 0.1s linear; }
        #start-btn { padding: 18px 60px; font-size: 1.3rem; cursor: pointer; border: none; border-radius: 50px; background: #1a1a1a; color: white; font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .footer { margin-top: 20px; font-size: 0.9rem; color: #888; font-weight: 600; }
    </style>
</head>
<body oncontextmenu="return false" onselectstart="return false" ondragstart="return false">

<div class="container">
    <h1 class="main-title">21홀 트레몰로 하모니카 날숨 마스터</h1>

    <svg id="harmonica-svg" viewBox="0 0 1600 240">
        <defs>
            <linearGradient id="case-grad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#f8f9fa"/><stop offset="50%" style="stop-color:#bbb"/><stop offset="100%" style="stop-color:#888"/></linearGradient>
            <linearGradient id="body-grad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#444"/><stop offset="50%" style="stop-color:#666"/><stop offset="100%" style="stop-color:#333"/></linearGradient>
        </defs>
        <rect x="30" y="35" width="120" height="170" fill="#222" rx="10"/> 
        <rect x="1450" y="35" width="120" height="170" fill="#222" rx="10"/> 
        <rect x="150" y="10" width="1300" height="25" fill="url(#case-grad)" rx="5"/> 
        <rect x="150" y="205" width="1300" height="25" fill="url(#case-grad)" rx="5"/> 
        <rect x="150" y="35" width="1300" height="170" fill="url(#body-grad)"/> 
        <text x="90" y="135" font-size="60" fill="white" font-weight="bold" text-anchor="middle">C조</text>
        <g id="holes-group"></g><g id="red-boxes"></g><g id="hole-numbers"></g>
    </svg>

    <div class="menu-grid" id="training-menu">
        <button class="menu-btn active" onclick="_sm('C4C5')">저음도(<div class="num-box">1<span class="dot"></span></div>)-중음도(1)</button>
        <button class="menu-btn" onclick="_sm('E4E5')">저음미(<div class="num-box">3<span class="dot"></span></div>)-중음미(3)</button>
        <button class="menu-btn" onclick="_sm('G4G5')">저음솔(<div class="num-box">5<span class="dot"></span></div>)-중음솔(5)</button>
        <button class="menu-btn" onclick="_sm('C5C6')">중음도(1)-고음도(<div class="num-box"><span class="dot"></span>1</div>)</button>
        <button class="menu-btn" onclick="_sm('E5E6')">중음미(3)-고음미(<div class="num-box"><span class="dot"></span>3</div>)</button>
        <button class="menu-btn" onclick="_sm('G5G6')">중음솔(5)-고음솔(<div class="num-box"><span class="dot"></span>5</div>)</button>
        <button class="menu-btn" style="grid-column: span 2;" onclick="_sm('C6C7')">고음도(<div class="num-box"><span class="dot"></span>1</div>)-최고음도(<div class="num-box"><div style="display:flex;gap:2px"><span class="dot"></span><span class="dot"></span></div>1</div>)</button>
    </div>

    <div class="indicator-container">
        <div id="lamp-low" class="note-lamp">낮은 음</div>
        <div id="lamp-high" class="note-lamp">높은 음</div>
    </div>
    <canvas id="visualizer"></canvas>
    <div class="status-msg" id="status-text">지도자 임지수와 함께하는 날숨 훈련</div>
    <div class="progress-bar"><div id="progress-fill"></div></div>
    <button id="start-btn">훈련 시작하기</button>
    <div class="footer">ⓒ 2026. 임지수 하모니카 교육연구소. All Rights Reserved.</div>
</div>

<script>
    /* 보안: 개발자 도구 차단 */
    window.addEventListener('keydown', function(e) {
        if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) {
            e.preventDefault(); return false;
        }
    });

    // 난독화된 데이터 및 핵심 변수
    const _H = { 1:['레','l'], 2:['도','l'], 3:['파','l'], 4:['미','l'], 5:['라','l'], 6:['솔','l'], 7:['시','l'], 8:['도','m'], 9:['레','m'], 10:['미','m'], 11:['파','m'], 12:['솔','m'], 13:['라','m'], 15:['시','m'], 14:['도','h'], 17:['레','h'], 16:['미','h'], 19:['파','h'], 18:['솔','h'], 20:['도','sh'], 21:['라','h'] };
    const _M = {
        'C4C5': { f1: 261.63, f2: 523.25, mL: 320, mH: 460, h: [2, 8], l1: '저음도', l2: '중음도' },
        'E4E5': { f1: 329.63, f2: 659.25, mL: 420, mH: 580, h: [4, 10], l1: '저음미', l2: '중음미' },
        'G4G5': { f1: 392.00, f2: 783.99, mL: 450, mH: 700, h: [6, 12], l1: '저음솔', l2: '중음솔' },
        'C5C6': { f1: 523.25, f2: 1046.50, mL: 600, mH: 950, h: [8, 14], l1: '중음도', l2: '고음도' },
        'E5E6': { f1: 659.25, f2: 1318.51, mL: 750, mH: 1200, h: [10, 16], l1: '중음미', l2: '고음미' },
        'G5G6': { f1: 783.99, f2: 1567.98, mL: 900, mH: 1400, h: [12, 18], l1: '중음솔', l2: '고음솔' },
        'C6C7': { f1: 1046.50, f2: 2093.00, mL: 1200, mH: 1900, h: [14, 20], l1: '고음도', l2: '최고음도' }
    };

    let _ac, _an, _da, _sc = 0; let _cm = 'C4C5';

    function _rh() {
        const hG = document.getElementById('holes-group'), rB = document.getElementById('red-boxes'), hN = document.getElementById('hole-numbers');
        for (let i = 1; i <= 21; i++) {
            const x = 165 + (i-1) * 62, d = _H[i];
            _ch(hG, x, 40, i, d, 'top', d[0]==='도'?'1':d[0]==='미'?'3':'5');
            _ch(hG, x, 125, i, d, 'bottom', d[0]);
            const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
            t.setAttribute("x", x+29); t.setAttribute("y", 223); t.setAttribute("font-size", "14"); t.setAttribute("text-anchor", "middle"); t.textContent = i; hN.appendChild(t);
            if ([2, 8, 14, 20].includes(i)) {
                const r = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                r.setAttribute("x", x-2); r.setAttribute("y", 38); r.setAttribute("width", 62); r.setAttribute("height", 164); r.setAttribute("rx", "5"); r.setAttribute("class", "do-box"); rB.appendChild(r);
            }
        }
    }

    function _ch(p, x, y, n, d, pos, l) {
        const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
        const r = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        r.setAttribute("x", x); r.setAttribute("y", y); r.setAttribute("width", 58); r.setAttribute("height", 75); r.setAttribute("class", "hole"); r.setAttribute("id", `hole-${n}-${pos}`); g.appendChild(r);
        const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
        t.setAttribute("x", x+29); t.setAttribute("y", y+43); t.setAttribute("fill", "white"); t.setAttribute("text-anchor", "middle"); t.setAttribute("font-size", "22"); t.setAttribute("font-weight", "bold"); t.textContent = l; g.appendChild(t);
        if (d[1]==='l') _ad(g, x+29, y+65); else if (d[1]==='h') _ad(g, x+29, y+12); else if (d[1]==='sh') { _ad(g, x+21, y+12); _ad(g, x+37, y+12); }
        p.appendChild(g);
    }

    function _ad(p, cx, cy) {
        const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        c.setAttribute("cx", cx); c.setAttribute("cy", cy); c.setAttribute("r", "3.2"); c.setAttribute("fill", "white"); p.appendChild(c);
    }

    function _sm(m) {
        _cm = m; _sc = 0; document.body.classList.remove('success-glow');
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.toggle('active', b.getAttribute('onclick').includes(m)));
        const c = _M[m]; document.getElementById('lamp-low').innerText = c.l1; document.getElementById('lamp-high').innerText = c.l2;
        document.getElementById('status-text').innerText = `${c.l1}-${c.l2} 훈련 대기`;
        document.getElementById('progress-fill').style.width = "0%";
    }

    document.getElementById('start-btn').onclick = async () => {
        try {
            _ac = new (window.AudioContext || window.webkitAudioContext)();
            const s = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false }});
            const src = _ac.createMediaStreamSource(s); _an = _ac.createAnalyser(); _an.fftSize = 4096; src.connect(_an);
            _da = new Uint8Array(_an.frequencyBinCount); document.getElementById('start-btn').style.display = 'none'; _lp();
        } catch (e) { alert("마이크를 허용해 주세요."); }
    };

    function _lp() {
        _an.getByteFrequencyData(_da);
        const c = _M[_cm], ny = _ac.sampleRate/2, bin = _an.frequencyBinCount;
        const gE = (f) => _da[Math.round((f/ny)*bin)];
        const e1 = gE(c.f1), e2 = gE(c.f2);
        let eM = 0; const bL = Math.round((c.mL/ny)*bin), bH = Math.round((c.mH/ny)*bin);
        for (let i = bL; i <= bH; i++) if (_da[i] > eM) eM = _da[i];

        const h1 = e1 > 95, h2 = e2 > 75, lk = eM > (Math.max(e1, e2)*0.45);
        document.getElementById('lamp-low').className = h1 ? 'note-lamp active' : 'note-lamp';
        document.getElementById('lamp-high').className = h2 ? 'note-lamp active' : 'note-lamp';
        document.querySelectorAll('.hole').forEach(h => h.classList.remove('active'));
        if (h1) { document.getElementById(`hole-${c.h[0]}-top`).classList.add('active'); document.getElementById(`hole-${c.h[0]}-bottom`).classList.add('active'); }
        if (h2) { document.getElementById(`hole-${c.h[1]}-top`).classList.add('active'); document.getElementById(`hole-${c.h[1]}-bottom`).classList.add('active'); }

        const st = document.getElementById('status-text');
        if (h1 && h2) {
            if (lk) { _sc = 0; document.body.style.backgroundColor = "#ffcfcf"; st.innerText = "불필요한 소리(누설)가 감지됩니다!"; }
            else { 
                _sc++; let p = (_sc / 50) * 100; document.getElementById('progress-fill').style.width = Math.min(p, 100) + "%";
                if (_sc >= 15) { document.body.classList.add('success-glow'); st.innerText = "🏆 완벽한 옥타브 날숨입니다!"; }
                else { document.body.style.backgroundColor = "#d3f9d8"; st.innerText = "좋습니다! 그대로 유지하세요."; }
            }
        } else {
            _sc = 0; document.body.classList.remove('success-glow'); document.body.style.backgroundColor = "#f0f4f8";
            st.innerText = "옥타브 날숨을 일정하게 불어보세요.";
        }
        _ds(c); requestAnimationFrame(_lp);
    }

    function _ds(c) {
        const cv = document.getElementById('visualizer'), cx = cv.getContext('2d');
        cx.fillStyle = '#1a1a1a'; cx.fillRect(0, 0, cv.width, cv.height);
        const bw = cv.width / 100;
        for (let i = 0; i < 100; i++) {
            const bh = (_da[i+10] / 255) * cv.height;
            cx.fillStyle = `hsl(210, 70%, 50%)`;
            cx.fillRect(i * bw, cv.height - bh, bw - 1, bh);
        }
    }
    _rh(); _sm('C4C5');
</script>
</body>
</html>
